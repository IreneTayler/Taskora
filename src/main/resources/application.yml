spring:
  application:
    name: task-management-service
  
  datasource:
    url: jdbc:h2:mem:taskdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  
  sql:
    init:
      mode: always
  
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    com.taskmanagement: DEBUG